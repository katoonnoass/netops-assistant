{% extends 'base.html' %}
{% block title %}Nova Comparação - NetOps Assistant{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Nova Comparação</h1>
    <p>Selecione dois snapshots para comparar.</p>
</div>

<div class="card">
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label for="id_title">Título <span style="font-weight:400;color:var(--text-secondary);">(opcional)</span></label>
            <input type="text" name="title" id="id_title" class="form-control"
                   placeholder="Ex: Mudança no cliente Alfa - 2026-06">
        </div>

        <div class="form-group">
            <label for="id_base">Snapshot Base (antes)</label>
            <select name="base_snapshot" id="id_base" class="form-control" required>
                <option value="">— Selecione —</option>
                {% for snap in snapshots %}
                <option value="{{ snap.pk }}">
                    #{{ snap.pk }} - {{ snap.device.name|default:"(sem device)" }}
                    ({{ snap.created_at|date:"d/m/Y H:i" }}) - {{ snap.vendor }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="id_target">Snapshot Alvo (depois)</label>
            <select name="target_snapshot" id="id_target" class="form-control" required>
                <option value="">— Selecione —</option>
                {% for snap in snapshots %}
                <option value="{{ snap.pk }}">
                    #{{ snap.pk }} - {{ snap.device.name|default:"(sem device)" }}
                    ({{ snap.created_at|date:"d/m/Y H:i" }}) - {{ snap.vendor }}
                </option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Comparar</button>
        <a href="{% url 'comparison_list' %}" class="btn btn-outline">Cancelar</a>
    </form>
</div>
{% endblock %}
