{% extends "base.html" %}
{% load static %}
{% block title %}Novo Link Manual{% endblock %}
{% block content %}
<h2>Novo Link Manual — {{ session.name }}</h2>
<a href="{% url 'vlan_tracking:link_list' session.pk %}" class="btn">Voltar</a>
<form method="post">
  {% csrf_token %}
  <div class="form-group">
    <label>Dispositivo A</label>
    <select name="device_a" class="form-control" required>
      <option value="">—</option>
      {% for d in devices %}
      <option value="{{ d.id }}">{{ d.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="form-group">
    <label>Interface A</label>
    <input type="text" name="interface_a" class="form-control" required placeholder="Ex: GigabitEthernet0/0/1">
  </div>
  <div class="form-group">
    <label>Dispositivo B</label>
    <select name="device_b" class="form-control" required>
      <option value="">—</option>
      {% for d in devices %}
      <option value="{{ d.id }}">{{ d.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="form-group">
    <label>Interface B</label>
    <input type="text" name="interface_b" class="form-control" required placeholder="Ex: GigabitEthernet0/0/2">
  </div>
  <div class="form-group">
    <label>Observações</label>
    <textarea name="notes" class="form-control" rows="2"></textarea>
  </div>
  <button type="submit" class="btn btn-primary">Criar Link</button>
</form>
{% endblock %}
