# HTTPS Example — Nginx Configuration
# 
# Este arquivo é um template para habilitar HTTPS.
# Substitua os caminhos dos certificados e ajuste o server_name.
#
# Uso:
#   1. Gere ou obtenha certificados SSL (ex: Let's Encrypt / Certbot)
#   2. Copie este arquivo para docker/nginx/default.conf
#   3. Ajuste server_name, ssl_certificate, ssl_certificate_key
#   4. docker compose exec nginx nginx -s reload

# Redirecionamento HTTP -> HTTPS
server {
    listen 80;
    server_name seu-dominio.local;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name seu-dominio.local;

    # SSL certificates (ajuste os caminhos)
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Upload limit
    client_max_body_size 10M;

    # Static files
    location /static/ {
        alias /static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /media/;
    }

    # Django application
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
